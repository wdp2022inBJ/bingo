<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>萌宠运动启动 Bingo</title>
  <style>
    :root{--ink:#493e43;--muted:#81767b;--paper:#fffdf9;--pink:#f7b9c8;--pink2:#fff0f4;--mint:#a9dbc5;--mint2:#edf9f3;--yellow:#f7d77b;--blue:#a9cee4;--lav:#cdbde7;--line:#decfd3;--shadow:#d8bdc566}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background-color:#fff7f4;background-image:radial-gradient(#efcad4 1.3px,transparent 1.3px),radial-gradient(#c9e5d8 1.1px,transparent 1.1px);background-position:0 0,13px 13px;background-size:26px 26px;font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif}
    button{font:inherit;color:inherit}.shell{width:min(1080px,calc(100% - 22px));margin:auto}
    .hero{padding:25px 0 18px}.hero-card{position:relative;overflow:hidden;background:var(--paper);border:3px solid var(--ink);border-radius:22px 28px 20px 26px;box-shadow:7px 8px 0 var(--shadow);padding:24px clamp(18px,5vw,44px)}
    .hero h1{margin:0;font-size:clamp(28px,6vw,48px);letter-spacing:0}.hero p{margin:7px 0 0;color:var(--muted);max-width:650px}.scribble{display:inline;background:linear-gradient(transparent 65%,var(--yellow) 65%)}
    .pet{position:absolute;width:88px;height:76px;right:25px;bottom:-8px;background:var(--mint);border:3px solid var(--ink);border-radius:48% 52% 44% 48%;transform:rotate(3deg)}.pet:before,.pet:after{content:"";position:absolute;width:29px;height:34px;background:var(--mint);border:3px solid var(--ink);top:-20px;z-index:-1}.pet:before{left:7px;border-radius:80% 20% 30% 20%;transform:rotate(-18deg)}.pet:after{right:7px;border-radius:20% 80% 20% 30%;transform:rotate(18deg)}.pet-face:before{content:"• ᴗ •";position:absolute;left:17px;top:23px;font-size:20px;font-weight:bold;white-space:nowrap}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}.tab{border:3px solid var(--ink);background:var(--paper);border-radius:16px 20px 15px 22px;padding:13px 10px;cursor:pointer;font-weight:800;box-shadow:4px 5px 0 var(--shadow)}.tab.active{background:var(--pink);transform:translateY(2px);box-shadow:2px 3px 0 var(--shadow)}
    .status{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;background:var(--paper);border:2px dashed var(--line);border-radius:18px;padding:13px 15px;margin-bottom:13px}.status h2{margin:0;font-size:20px}.status p{margin:2px 0 0;color:var(--muted);font-size:13px}.progress{width:150px}.track{height:12px;border:2px solid var(--ink);border-radius:20px;background:#fff;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--yellow),var(--mint));transition:.3s}.progress-text{text-align:right;font-size:12px;margin-top:3px}
    .board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.cell{aspect-ratio:1/1;position:relative;display:flex;flex-direction:column;justify-content:space-between;text-align:left;border:2px solid var(--ink);border-radius:14px 18px 13px 20px;background:var(--paper);padding:8px;cursor:pointer;box-shadow:3px 4px 0 var(--shadow);transition:.15s;min-width:0}.cell:nth-child(4n+1){background:var(--pink2)}.cell:nth-child(4n+2){background:var(--mint2)}.cell:nth-child(4n+3){background:#fff9e7}.cell:nth-child(4n){background:#f3effa}.cell:hover{transform:translateY(-2px) rotate(-1deg)}.cell.done{background:var(--mint);box-shadow:inset 0 0 0 3px #fff,3px 4px 0 var(--shadow)}.cell.done:after{content:"";position:absolute;right:7px;top:7px;width:11px;height:11px;background:var(--pink);border:2px solid var(--ink);border-radius:50%}
    .number{font-family:Georgia,serif;font-weight:bold;font-style:italic;color:#a56a7b;font-size:13px}.cell-title{font-size:clamp(10px,1.7vw,14px);line-height:1.28;font-weight:800;overflow-wrap:anywhere}.mark{display:flex;gap:3px}.mark i{display:block;width:5px;height:5px;border-radius:50%;background:var(--pink);border:1px solid var(--ink)}.mark i:nth-child(2){background:var(--yellow)}.mark i:nth-child(3){background:var(--mint)}
    .under{display:flex;justify-content:space-between;align-items:center;margin:13px 0 48px;gap:10px}.reset{border:2px solid var(--ink);background:var(--paper);border-radius:12px;padding:7px 11px;cursor:pointer}.hint{color:var(--muted);font-size:13px}
    dialog{border:0;padding:0;width:min(520px,calc(100% - 20px));max-height:92vh;background:transparent;color:var(--ink)}dialog::backdrop{background:#5c485166}.modal-sheet{background:var(--paper);border:3px solid var(--ink);border-radius:24px 28px 22px 25px;box-shadow:8px 9px 0 #5c485144;overflow:hidden}.modal-head{position:relative;padding:18px 20px;background:var(--pink2);border-bottom:2px dashed var(--line)}.modal-head small{color:#a56a7b}.modal-head h2{margin:3px 0 0;font-size:24px}.modal-body{padding:17px;max-height:70vh;overflow:auto}.action-image{display:block;width:100%;height:min(290px,42vh);object-fit:contain;background:#f8f1e7;border:2px solid var(--ink);border-radius:18px;margin-bottom:12px}.instant-card{display:none;background:var(--mint2);border:2px dashed var(--mint);border-radius:18px;padding:24px;text-align:center;margin-bottom:12px}.instant-card strong{display:block;font-size:28px;margin-bottom:6px}.instant-card span{color:var(--muted)}
    .instant-card.pet-card{position:relative;overflow:hidden;padding:14px 15px 17px;border-radius:22px;background:var(--mint2)}.instant-card.pet-card strong{font-size:24px;margin:8px 0 2px}.instant-card.pet-card span{font-size:14px}.buddy-stage{height:190px;display:flex;align-items:end;justify-content:center;position:relative}.buddy-shadow{position:absolute;bottom:5px;width:116px;height:18px;background:#b9a8ad44;border-radius:50%}.buddy{--fur:var(--pink);--ear:var(--pink);position:relative;width:125px;height:112px;background:var(--fur);border:3px solid var(--ink);border-radius:48% 52% 42% 45%;transform-origin:bottom center;animation:buddyMove .85s ease-in-out infinite alternate;z-index:1}.buddy:before,.buddy:after{content:"";position:absolute;width:38px;height:48px;background:var(--ear);border:3px solid var(--ink);top:-27px;z-index:-1}.buddy:before{left:8px;border-radius:75% 25% 42% 30%;transform:rotate(-18deg)}.buddy:after{right:8px;border-radius:25% 75% 30% 42%;transform:rotate(18deg)}.buddy-face{position:absolute;left:0;right:0;top:38px;font-size:26px;font-weight:900;letter-spacing:4px;white-space:nowrap}.buddy-face:before{content:"• ᴗ •"}.buddy-paw{position:absolute;width:38px;height:24px;background:var(--fur);border:3px solid var(--ink);border-radius:50%;bottom:-8px}.buddy-paw.left{left:5px;transform:rotate(-10deg)}.buddy-paw.right{right:5px;transform:rotate(10deg)}.buddy.cat:before,.buddy.cat:after{height:42px;border-radius:12% 80% 30% 30%}.buddy.rabbit:before,.buddy.rabbit:after{height:76px;width:29px;top:-59px;border-radius:70%}.buddy.bear:before,.buddy.bear:after{height:33px;width:33px;top:-15px;border-radius:50%}.buddy.dog:before{transform:rotate(-42deg);border-radius:70% 30% 60% 40%}.buddy.dog:after{transform:rotate(42deg);border-radius:30% 70% 40% 60%}.buddy-action{position:absolute;top:3px;right:5px;background:var(--yellow);border:2px solid var(--ink);border-radius:50%;width:58px;height:58px;display:grid;place-items:center;font-size:11px;font-weight:bold;transform:rotate(8deg);z-index:2}.buddy-spark{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--pink);border:1px solid var(--ink);animation:spark 1s infinite alternate}.buddy-spark.a{left:24%;top:25%}.buddy-spark.b{right:23%;top:42%;background:var(--yellow);animation-delay:.25s}.buddy-spark.c{left:29%;bottom:22%;background:var(--blue);animation-delay:.5s}@keyframes buddyMove{from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-12px) rotate(2deg)}}@keyframes spark{from{transform:scale(.7);opacity:.4}to{transform:scale(1.35);opacity:1}}
    .timer{display:flex;align-items:center;justify-content:space-between;background:#55464d;color:white;border-radius:14px;padding:9px 12px;margin-bottom:12px}.timer strong{font-size:24px;color:var(--yellow)}.timer button{border:2px solid #fff;background:transparent;color:white;border-radius:10px;padding:5px 10px;cursor:pointer}.steps{padding-left:20px}.steps li{margin:7px 0}.cue{background:#eef7fb;border-left:5px solid var(--blue);padding:10px 12px;border-radius:0 12px 12px 0}.actions{display:flex;gap:8px;margin-top:15px}.primary,.secondary{border:2px solid var(--ink);border-radius:12px;padding:10px 13px;cursor:pointer}.primary{background:var(--mint);flex:1;font-weight:bold}.secondary{background:white}
    .reward-sheet{text-align:center;padding:25px 20px 22px}.egg{position:relative;width:130px;height:165px;margin:5px auto 18px;background:linear-gradient(135deg,#fff,var(--pink));border:4px solid var(--ink);border-radius:50% 50% 47% 47%;cursor:pointer;animation:wobble 1.2s infinite}.egg:before,.egg:after{content:"";position:absolute;border-radius:50%;background:var(--yellow)}.egg:before{width:25px;height:18px;left:22px;top:50px;transform:rotate(-20deg)}.egg:after{width:18px;height:24px;right:25px;top:92px;transform:rotate(25deg)}.egg.cracked{animation:none;background:var(--mint)}.egg.cracked:before{content:"• ᴗ •";background:transparent;width:auto;height:auto;left:30px;top:63px;font-size:27px;font-weight:bold;white-space:nowrap}.egg.cracked:after{display:none}@keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}.reward-sheet h2{margin:0}.reward-sheet p{color:var(--muted)}.reward-close{border:2px solid var(--ink);background:var(--pink);border-radius:12px;padding:9px 16px;cursor:pointer}
    @media(max-width:650px){.pet{width:64px;height:57px;right:10px}.pet-face:before{font-size:14px;left:12px;top:18px}.pet:before,.pet:after{width:20px;height:25px}.hero-card{padding-right:72px}.board{gap:4px}.cell{padding:5px;border-width:1.5px;border-radius:9px 11px 8px 12px;box-shadow:2px 2px 0 var(--shadow)}.cell-title{font-size:10px}.number{font-size:10px}.status{grid-template-columns:1fr}.progress{width:100%}}
  </style>
</head>
<body>
  <header class="hero"><div class="shell"><div class="hero-card">
    <h1><span class="scribble">先动一下</span> Bingo</h1>
    <p>不用先成为爱运动的人。先让身体动一下，大脑会慢慢跟上来。</p>
    <div class="pet"><span class="pet-face"></span></div>
  </div></div></header>
  <main class="shell">
    <nav class="tabs"><button class="tab active" data-board="spark">1 · 5秒轻启动</button><button class="tab" data-board="move">2 · 5分钟轻挑战</button></nav>
    <section class="status"><div><h2 id="title"></h2><p id="desc"></p></div><div class="progress"><div class="track"><div class="fill" id="fill"></div></div><div class="progress-text" id="progressText"></div></div></section>
    <section class="board" id="board"></section>
    <div class="under"><span class="hint" id="hint"></span><button class="reset" id="reset">重置这一关</button></div>
  </main>

  <dialog id="actionModal"><div class="modal-sheet"><div class="modal-head"><small id="scene"></small><h2 id="actionTitle"></h2></div><div class="modal-body">
    <img class="action-image" id="actionImage" alt=""><div class="instant-card pet-card" id="instant"><div class="buddy-stage"><div class="buddy-shadow"></div><div class="buddy-action" id="buddyAction"></div><i class="buddy-spark a"></i><i class="buddy-spark b"></i><i class="buddy-spark c"></i><div class="buddy cat" id="buddy"><span class="buddy-face"></span><i class="buddy-paw left"></i><i class="buddy-paw right"></i></div></div><strong id="buddyName">现在，动一下。</strong><span id="buddyWords">不用标准，不用准备，完成这个微动作就可以。</span></div>
    <div class="timer" id="timer"><span>轻挑战计时</span><strong id="timerText">00:30</strong><button id="timerBtn">开始</button></div>
    <ol class="steps" id="steps"></ol><div class="cue" id="cue"></div><div class="actions"><button class="primary" id="complete">完成，点亮格子</button><button class="secondary" id="close">先等等</button></div>
  </div></div></dialog>
  <dialog id="rewardModal"><div class="modal-sheet reward-sheet"><h2>萌宠蛋解锁啦</h2><p id="rewardPrompt">点一下蛋，让新朋友出来。</p><div class="egg" id="egg"></div><h2 id="petName"></h2><p id="encourage"></p><button class="reward-close" id="rewardClose">带萌宠回到棋盘</button></div></dialog>

<script>
const sparkNames=["眨眨眼","抬一下下巴","转一下肩","握拳再松开","脚尖点地","站起来一下","伸一次懒腰","向左看一眼","向右看一眼","抬一下手臂","轻拍一下腿","踮一次脚尖","深呼吸一次","原地迈一步","摸一下脚踝","挺直一下背","晃一下手腕","抬一下膝盖","转一下脚踝","双手击掌","轻轻转身","脚跟点地","肩膀放松一下","摸一下墙","向前走一步"];
const spark=sparkNames.map((name,i)=>({id:"s"+i,title:name,scene:"5秒轻启动 · 每格约1秒",steps:["看到动作后，不分析。","立刻完成一次。","完成就点亮，不追加任务。"],cue:"这一关不是锻炼身体，是打断「我不想动」的念头。"}));
const buddies=[
  {type:"cat",name:"启动猫",fur:"#f7b9c8",words:"猫猫先动啦，你跟一下就好。"},
  {type:"rabbit",name:"一秒兔",fur:"#f6d7df",words:"只要一秒，兔兔陪你完成。"},
  {type:"bear",name:"抱抱熊",fur:"#e8c89f",words:"不用努力，轻轻动一下就够。"},
  {type:"dog",name:"元气小狗",fur:"#f1cf8c",words:"动一下就有小狗为你摇尾巴。"},
  {type:"cat",name:"软糖猫",fur:"#b9dcca",words:"今天不用燃起来，启动就很好。"},
  {type:"rabbit",name:"云朵兔",fur:"#cfc1e7",words:"先做这一小下，其他事情以后再说。"}
];
const moveData=[
["原地踏步","双脚交替抬起，手臂自然摆动。","保持能正常说话的速度。"],["肩膀绕环","向后绕圈15秒，再向前绕圈15秒。","缓慢，不要耸肩。"],["左右点步","左右迈步并拢，轻松换重心。","膝盖微屈。"],["扶椅提踵","扶稳后缓慢抬起、落下脚跟。","身体保持直立。"],["呼吸伸展","吸气举手，呼气放下。","自然呼吸，不屏气。"],
["推墙俯卧撑","屈肘靠近墙，再推回去。","身体保持一条直线。"],["扶椅侧抬腿","一腿侧抬15秒，再换边。","身体不要歪。"],["扶椅后抬腿","一腿后抬15秒，再换边。","不要塌腰。"],["扶椅后勾腿","脚跟靠近臀部，15秒后换边。","膝盖朝下。"],["椅子浅蹲","臀部向后轻触椅面，再站起。","膝盖朝向脚尖。"],
["站立转体","身体温和左右转动。","骨盆尽量朝前。"],["侧弯伸展","一手举高，向对侧弯，随后换边。","不要向前塌胸。"],["下巴回收","下巴水平轻轻向后收。","不是低头。"],["肩胛后收","肩胛骨轻轻靠拢再放松。","肩膀远离耳朵。"],["靠墙天使","手臂沿墙缓慢上下移动。","腰部不要过度拱起。"],
["坐姿踏步","坐直，交替抬膝。","坐着动也算运动。"],["坐姿伸膝","一腿伸直15秒，再换边。","不要甩腿。"],["坐姿勾绷脚","脚尖向前绷，再向身体勾回。","缓慢连续。"],["坐姿上举","双臂缓慢上举再放下。","肩痛就降低高度。"],["坐姿转体","坐直后温和左右转体。","不用惯性。"],
["臀桥","收紧臀部抬起骨盆，再缓慢落下。","臀部发力，不顶腰。"],["鸟狗式","伸出对侧手腿，随后换边。","腰背保持稳定。"],["猫牛式","呼气拱背，吸气回正。","幅度舒适即可。"],["仰卧四字拉伸","保持15秒，再换边。","温和拉伸即可。"],["靠墙抬腿休息","双腿自然靠墙，轻松呼吸。","不舒服就放下双腿。"]
];
const move=moveData.map((x,i)=>({id:"m"+i,title:x[0],scene:"5分钟轻挑战 · 每格30秒",steps:[x[1],"动作保持30秒，随时可以暂停。"],cue:x[2],image:`assets/bingo/action-${String(i+1).padStart(2,"0")}.jpg`}));
const boards={spark:{title:"Bingo 1 · 5秒轻启动",desc:"每格只需约1秒。完成任意一条线：5格、5秒，先打断大脑的不行动。",items:spark,target:5,rule:"line"},move:{title:"Bingo 2 · 5分钟运动轻挑战",desc:"每格运动30秒。累计完成10格，就是5分钟轻挑战。",items:move,target:10,rule:"count"}};
const state=JSON.parse(localStorage.getItem("cuteMoveBingo")||'{"spark":[],"move":[],"rewarded":[]}');let current="spark",selected=null,timerId=null,left=30;
const board=document.getElementById("board"),actionModal=document.getElementById("actionModal"),rewardModal=document.getElementById("rewardModal");
function lines(key){const set=new Set(state[key]),a=boards[key].items;let n=0;for(let r=0;r<5;r++)if([0,1,2,3,4].every(c=>set.has(a[r*5+c].id)))n++;for(let c=0;c<5;c++)if([0,1,2,3,4].every(r=>set.has(a[r*5+c].id)))n++;if([0,6,12,18,24].every(i=>set.has(a[i].id)))n++;if([4,8,12,16,20].every(i=>set.has(a[i].id)))n++;return n}
function won(key){return boards[key].rule==="line"?lines(key)>0:state[key].length>=boards[key].target}
function save(){localStorage.setItem("cuteMoveBingo",JSON.stringify(state))}
function render(){const b=boards[current],count=state[current].length,goal=b.target;document.getElementById("title").textContent=b.title;document.getElementById("desc").textContent=b.desc;document.getElementById("fill").style.width=Math.min(100,count/goal*100)+"%";document.getElementById("progressText").textContent=b.rule==="line"?`${count}格 · ${lines(current)}条连线`:`${count} / ${goal}格`;document.getElementById("hint").textContent=b.rule==="line"?"完成横、竖或斜线任意一条即可开蛋。":"不要求连线，累计完成10格即可开蛋。";board.innerHTML=b.items.map((x,i)=>`<button class="cell ${state[current].includes(x.id)?"done":""}" data-id="${x.id}"><span class="number">${String(i+1).padStart(2,"0")}</span><strong class="cell-title">${x.title}</strong><span class="mark"><i></i><i></i><i></i></span></button>`).join("");board.querySelectorAll(".cell").forEach(x=>x.onclick=()=>openAction(x.dataset.id))}
function resetTimer(){clearInterval(timerId);timerId=null;left=30;document.getElementById("timerText").textContent="00:30";document.getElementById("timerBtn").textContent="开始"}
function openAction(id){selected=boards[current].items.find(x=>x.id===id);document.getElementById("scene").textContent=selected.scene;document.getElementById("actionTitle").textContent=selected.title;document.getElementById("steps").innerHTML=selected.steps.map(s=>`<li>${s}</li>`).join("");document.getElementById("cue").textContent=selected.cue;const isSpark=current==="spark";document.getElementById("instant").style.display=isSpark?"block":"none";document.getElementById("timer").style.display=isSpark?"none":"flex";if(isSpark){const index=boards.spark.items.indexOf(selected),friend=buddies[index%buddies.length],buddy=document.getElementById("buddy");buddy.className="buddy "+friend.type;buddy.style.setProperty("--fur",friend.fur);buddy.style.setProperty("--ear",friend.fur);document.getElementById("buddyAction").textContent=selected.title;document.getElementById("buddyName").textContent=friend.name+"：现在，动一下";document.getElementById("buddyWords").textContent=friend.words}const img=document.getElementById("actionImage");img.style.display=selected.image?"block":"none";if(selected.image){img.src=selected.image;img.alt=selected.title+"手绘动作图"}document.getElementById("complete").textContent=state[current].includes(id)?"取消点亮":"完成，点亮格子";resetTimer();actionModal.showModal()}
document.getElementById("timerBtn").onclick=()=>{if(timerId){clearInterval(timerId);timerId=null;document.getElementById("timerBtn").textContent="继续";return}document.getElementById("timerBtn").textContent="暂停";timerId=setInterval(()=>{left--;document.getElementById("timerText").textContent=`00:${String(left).padStart(2,"0")}`;if(left<=0){clearInterval(timerId);timerId=null;document.getElementById("timerBtn").textContent="完成";document.getElementById("complete").focus()}},1000)};
function openReward(){if(state.rewarded.includes(current))return;state.rewarded.push(current);save();const names=current==="spark"?["豆包猫","一秒兔","启动团子"]:["元气猫","轻动兔","力量团子"];document.getElementById("petName").textContent="";document.getElementById("encourage").textContent="";document.getElementById("rewardPrompt").textContent="点一下蛋，让新朋友出来。";document.getElementById("egg").classList.remove("cracked");document.getElementById("egg").dataset.name=names[Math.floor(Math.random()*names.length)];rewardModal.showModal()}
document.getElementById("egg").onclick=e=>{e.currentTarget.classList.add("cracked");document.getElementById("petName").textContent=e.currentTarget.dataset.name+" 加入了你";const words=current==="spark"?["你不是没动力，你只是需要一个小到不能拒绝的开始。","刚刚那一下，就是行动的证据。","不用燃起来，能启动就已经很好。"]:["五分钟不是很少，它是你认真照顾身体的五分钟。","你不需要练到累，愿意回来就很厉害。","今天的身体已经收到你的照顾啦。"];document.getElementById("encourage").textContent=words[Math.floor(Math.random()*words.length)];document.getElementById("rewardPrompt").textContent="蛋壳打开了。"}
document.getElementById("complete").onclick=()=>{const a=state[current],i=a.indexOf(selected.id),before=won(current);i>=0?a.splice(i,1):a.push(selected.id);save();resetTimer();actionModal.close();render();if(!before&&won(current))setTimeout(openReward,250)};document.getElementById("close").onclick=()=>{resetTimer();actionModal.close()};document.getElementById("rewardClose").onclick=()=>rewardModal.close();document.getElementById("reset").onclick=()=>{if(confirm("重置这一关的进度和萌宠奖励？")){state[current]=[];state.rewarded=state.rewarded.filter(x=>x!==current);save();render()}};
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");current=t.dataset.board;render()});render();
</script>
</body></html>
